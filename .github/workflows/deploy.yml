name: Deploy

on:
  push:
    branches: [main]
    paths:
      # Only rebuild + redeploy the Phase 2 Lambda when code that actually
      # lands in the Docker image changes. DataPhase1 runs as EC2 SSM
      # (not Lambda) so changes to phase1-only code would still require a
      # separate deploy mechanism — see weekly_collector.py path guard.
      - 'collectors/**'
      - 'store/**'
      - 'weekly_collector.py'
      - 'polygon_client.py'
      - 'ssm_secrets.py'
      - 'lambda/**'
      - 'config.py'
      - 'flow-doctor.yaml'
      - 'requirements*.txt'
      - 'Dockerfile*'
      - 'infrastructure/deploy.sh'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build + deploy Phase 2 Lambda
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout data repo
        uses: actions/checkout@v4
        with:
          path: alpha-engine-data

      # deploy.sh stages alpha-engine-lib into vendor/alpha-engine-lib
      # so the Dockerfile can COPY it. The lib is a private repo —
      # needs a PAT with Contents: read on cipher813/alpha-engine-lib,
      # stored as the ALPHA_ENGINE_LIB_TOKEN repository secret. Mirrors
      # the alpha-engine-research deploy.yml pattern; flow-doctor ships
      # transitively via alpha-engine-lib[flow_doctor].
      - name: Checkout alpha-engine-lib
        uses: actions/checkout@v4
        with:
          repository: cipher813/alpha-engine-lib
          path: alpha-engine-lib
          token: ${{ secrets.ALPHA_ENGINE_LIB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::711398986525:role/github-actions-lambda-deploy
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy Phase 2 Lambda (alpha-engine-data-collector)
        working-directory: alpha-engine-data
        env:
          # deploy.sh defaults LIB_REPO_DIR to ../alpha-engine-lib relative
          # to its CWD — ${{ github.workspace }}/alpha-engine-lib here,
          # exactly where the checkout step above placed it. Explicit
          # export is belt-and-suspenders for readers.
          LIB_REPO_DIR: ${{ github.workspace }}/alpha-engine-lib
        run: bash infrastructure/deploy.sh

      - name: Report deployed version
        working-directory: alpha-engine-data
        run: |
          echo "Deployed commit: ${{ github.sha }}"
          aws lambda get-function \
            --function-name alpha-engine-data-collector \
            --query "Configuration.[LastModified,CodeSha256]" \
            --output text

      - name: Append to system-wide deploy changelog
        if: always()
        uses: cipher813/alpha-engine-docs/.github/actions/append-changelog@main
        with:
          deploy_status: ${{ job.status == 'success' && 'success' || 'failure' }}
          deploy_workflow: deploy.yml
